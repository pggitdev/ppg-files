<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ประเมิน KPI บริษัทคู่สัญญา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -webkit-touch-callout: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            overflow-x: hidden;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1000px;
            padding: 24px;
            margin: 12px 0;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            color: #1a1a2e;
            font-size: clamp(20px, 5vw, 32px);
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #666;
            font-size: clamp(13px, 3vw, 15px);
            font-weight: 300;
            line-height: 1.5;
        }

        .progress-container {
            margin-bottom: 24px;
        }

        .progress-bar {
            background: #e8e8f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            font-weight: 500;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            font-size: clamp(12px, 2.5vw, 14px);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #1a1a2e;
            font-weight: 600;
            font-size: clamp(13px, 3vw, 15px);
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Kanit', sans-serif;
            transition: all 0.3s ease;
            background: #f8f9fc;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .section-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin: 32px 0 20px 0;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .evaluation-item {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
        }

        .evaluation-item:active {
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .evaluation-label {
            color: #1a1a2e;
            font-size: clamp(13px, 3vw, 15px);
            margin-bottom: 12px;
            font-weight: 600;
            display: block;
        }

        .rating-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .rating-option {
            padding: 12px 8px;
            border: 2px solid #e8e8f0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Kanit', sans-serif;
            transition: all 0.2s ease;
            text-align: center;
            font-size: clamp(11px, 2vw, 12px);
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .rating-option:active {
            transform: scale(0.95);
        }

        .rating-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .rating-labels {
            display: flex;
            justify-content: space-between;
            font-size: clamp(11px, 2vw, 12px);
            color: #aaa;
            font-weight: 300;
            margin-top: 8px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 32px;
            margin-bottom: 20px;
        }

        button {
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            font-size: clamp(13px, 3vw, 15px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Kanit', sans-serif;
            letter-spacing: 0.3px;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            grid-column: 1 / -1;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e8e8f0;
        }

        .btn-reset:active {
            background: #e8e8f0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
                border-radius: 20px;
                margin: 8px 0;
            }

            .header {
                margin-bottom: 24px;
            }

            .header h1 {
                margin-bottom: 6px;
            }

            .section-title {
                margin: 24px 0 16px 0;
            }

            .evaluation-item {
                padding: 14px;
                margin-bottom: 14px;
            }

            .rating-options {
                gap: 6px;
            }

            .button-group {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .btn-submit {
                grid-column: 1;
            }

            .btn-reset {
                grid-column: 1;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 12px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 20px;
            }

            .header p {
                font-size: 12px;
            }

            .section-title {
                font-size: 16px;
            }

            .rating-option {
                padding: 10px 6px;
                font-size: 11px;
            }

            label {
                font-size: 13px;
            }

            button {
                font-size: 13px;
                padding: 12px 14px;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-top: max(12px, env(safe-area-inset-top));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

                <button type="reset" class="btn-reset">ล้างข้อมูล</button>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('kpiForm');
        const alertDiv = document.getElementById('alert');
        const loadingDiv = document.getElementById('loading');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const submitBtn = document.getElementById('submitBtn');

        // Set today's date
        document.getElementById('evaluationDate').valueAsDate = new Date();

        // Add event listeners to rating options
        document.querySelectorAll('.rating-option').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const container = this.closest('.rating-options');
                container.querySelectorAll('.rating-option').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                updateProgress();
            });
        });

        // Update progress
        function updateProgress() {
            const totalItems = document.querySelectorAll('.rating-options').length;
            const selectedItems = document.querySelectorAll('.rating-option.selected').length;
            const progress = totalItems > 0 ? (selectedItems / totalItems) * 100 : 0;
            
            progressFill.style.width = progress + '%';
            progressText.textContent = Math.round(progress) + '%';
        }

        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate required fields
            const requiredInputs = form.querySelectorAll('select[required]');
            let isValid = true;
            for (let input of requiredInputs) {
                if (!input.value.trim()) {
                    isValid = false;
                    break;
                }
            }

            if (!isValid) {
                showAlert('❌ กรุณากรอกข้อมูลที่บังคับให้ครบ', 'error');
                return;
            }

            // Validate all items are scored
            const allScored = document.querySelectorAll('.rating-options').length === document.querySelectorAll('.rating-option.selected').length;
            if (!allScored) {
                showAlert('❌ กรุณาให้คะแนนทั้งหมด', 'error');
                return;
            }

            // Collect form data
            const formData = {
                evaluatorName: document.getElementById('evaluatorName').value,
                evaluationDate: document.getElementById('evaluationDate').value,
                timestamp: new Date().toISOString(),
                
                // งานบริหารจัดการ
                admin: {
                    scores: {
                        politeness: document.querySelector('[data-kpi="admin_politeness"] .rating-option.selected')?.dataset.value || '',
                        frequency: document.querySelector('[data-kpi="admin_frequency"] .rating-option.selected')?.dataset.value || '',
                        emergency: document.querySelector('[data-kpi="admin_emergency"] .rating-option.selected')?.dataset.value || '',
                        access: document.querySelector('[data-kpi="admin_access"] .rating-option.selected')?.dataset.value || '',
                        value: document.querySelector('[data-kpi="admin_value"] .rating-option.selected')?.dataset.value || ''
                    }
                },
                
                // งานรักษาความปลอดภัย
                security: {
                    scores: {
                        politeness: document.querySelector('[data-kpi="security_politeness"] .rating-option.selected')?.dataset.value || '',
                        frequency: document.querySelector('[data-kpi="security_frequency"] .rating-option.selected')?.dataset.value || '',
                        emergency: document.querySelector('[data-kpi="security_emergency"] .rating-option.selected')?.dataset.value || '',
                        access: document.querySelector('[data-kpi="security_access"] .rating-option.selected')?.dataset.value || '',
                        value: document.querySelector('[data-kpi="security_value"] .rating-option.selected')?.dataset.value || ''
                    }
                },
                
                // งานทำความสะอาด
                cleaning: {
                    scores: {
                        politeness: document.querySelector('[data-kpi="cleaning_politeness"] .rating-option.selected')?.dataset.value || '',
                        frequency: document.querySelector('[data-kpi="cleaning_frequency"] .rating-option.selected')?.dataset.value || '',
                        emergency: document.querySelector('[data-kpi="cleaning_emergency"] .rating-option.selected')?.dataset.value || '',
                        access: document.querySelector('[data-kpi="cleaning_access"] .rating-option.selected')?.dataset.value || '',
                        value: document.querySelector('[data-kpi="cleaning_value"] .rating-option.selected')?.dataset.value || ''
                    }
                },
                
                comments: document.getElementById('comments').value
            };

            loadingDiv.classList.add('show');
            submitBtn.disabled = true;

            try {
                // Send to backend (GAS)
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    showAlert('✅ บันทึกสำเร็จ!', 'success');
                    setTimeout(() => {
                        form.reset();
                        document.querySelectorAll('.rating-option').forEach(btn => btn.classList.remove('selected'));
                        progressFill.style.width = '0%';
                        progressText.textContent = '0%';
                        document.getElementById('evaluationDate').valueAsDate = new Date();
                    }, 1500);
                } else {
                    showAlert('❌ เกิดข้อผิดพลาด', 'error');
                }
            } catch (error) {
                showAlert('❌ ' + error.message, 'error');
            } finally {
                loadingDiv.classList.remove('show');
                submitBtn.disabled = false;
            }
        });

        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = 'alert show alert-' + type;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 4000);
        }

        // Initialize
        updateProgress();
    </script>
</body>
</html>
