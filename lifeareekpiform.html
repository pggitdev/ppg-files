<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมิน KPI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: clamp(24px, 5vw, 40px);
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 300;
            opacity: 0.95;
        }

        .iframe-wrapper {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            color: #667eea;
            font-size: 18px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile optimization */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                margin-bottom: 20px;
            }

            .iframe-wrapper iframe {
                height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="header">
            <h1>🏢 ระบบประเมิน KPI บริหารนิติบุคคล</h1>
            <p>กรุณาให้คะแนนผลการทำงานของแต่ละตำแหน่ง</p>
        </div>

        <div class="iframe-wrapper">
            <div class="loading">
                <div class="spinner"></div>
                <span>กำลังโหลดแบบฟอร์ม...</span>
            </div>
            <!-- แทนที่ URL ด้านล่างด้วย URL ของ GAS Web App ของคุณ -->
            <!-- <iframe id="kpiForm" src="https://script.google.com/macros/s/AKfycbzCA6H4uWEkrL08FRSAVFpHPI7Vo2W3RBkUn7oGGlCthu8SyKhUFrTDXYzTwVg_KBTY/exec" title="KPI Evaluation Form"></iframe> -->
            <iframe 
    src="https://script.google.com/macros/s/AKfycbzCA6H4uWEkrL08FRSAVFpHPI7Vo2W3RBkUn7oGGlCthu8SyKhUFrTDXYzTwVg_KBTY/usercache/v1/code" >
</iframe>

        </div>
    </div>

    <script>
        // ซ่อน Loading เมื่อ iframe โหลดเสร็จ
        document.getElementById('kpiForm').addEventListener('load', function() {
            const loading = document.querySelector('.loading');
            if (loading) {
                loading.style.display = 'none';
            }
        });

        // ปรับความสูง iframe ตามเนื้อหา (ถ้าต้องการ)
        function adjustIframeHeight() {
            const iframe = document.getElementById('kpiForm');
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (iframeDoc) {
                    const height = iframeDoc.documentElement.scrollHeight;
                    iframe.style.height = (height + 20) + 'px';
                }
            } catch (e) {
                console.log('ไม่สามารถปรับความสูง iframe ได้ (Cross-origin)');
            }
        }

        // เรียก adjustIframeHeight เมื่อ iframe โหลดเสร็จ
        document.getElementById('kpiForm').addEventListener('load', adjustIframeHeight);

        // ปรับความสูงทุก 2 วินาที
        setInterval(adjustIframeHeight, 2000);
    </script>
</body>
</html>
