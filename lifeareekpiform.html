<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ประเมิน KPI บริษัทคู่สัญญา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -webkit-touch-callout: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            overflow-x: hidden;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1000px;
            padding: 24px;
            margin: 12px 0;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            color: #1a1a2e;
            font-size: clamp(20px, 5vw, 32px);
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #666;
            font-size: clamp(13px, 3vw, 15px);
            font-weight: 300;
            line-height: 1.5;
        }

        .progress-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .progress-bar {
            background: #e8e8f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 12px;
            font-weight: 500;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            font-size: clamp(12px, 2.5vw, 14px);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #1a1a2e;
            font-weight: 600;
            font-size: clamp(13px, 3vw, 15px);
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Kanit', sans-serif;
            transition: all 0.3s ease;
            background: #f8f9fc;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .section-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin: 32px 0 20px 0;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .evaluation-item {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
        }

        .evaluation-item:active {
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .evaluation-label {
            color: #1a1a2e;
            font-size: clamp(13px, 3vw, 15px);
            margin-bottom: 12px;
            font-weight: 600;
            display: block;
        }

        .rating-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .rating-option {
            padding: 12px 8px;
            border: 2px solid #e8e8f0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Kanit', sans-serif;
            transition: all 0.2s ease;
            text-align: center;
            font-size: clamp(11px, 2vw, 12px);
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .rating-option:active {
            transform: scale(0.95);
        }

        .rating-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 32px;
            margin-bottom: 20px;
        }

        button {
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            font-size: clamp(13px, 3vw, 15px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Kanit', sans-serif;
            letter-spacing: 0.3px;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            grid-column: 1 / -1;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e8e8f0;
        }

        .btn-reset:active {
            background: #e8e8f0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-overlay.show {
            display: block;
        }

        .success-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 1000;
            max-width: 400px;
            width: 90%;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .success-modal.show {
            display: block;
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .success-modal h2 {
            color: #51cf66;
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .success-modal p {
            color: #666;
            font-size: 15px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .success-modal .btn-ok {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
            transition: all 0.3s ease;
        }

        .success-modal .btn-ok:active {
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
                border-radius: 20px;
                margin: 8px 0;
            }

            .header {
                margin-bottom: 24px;
            }

            .header h1 {
                margin-bottom: 6px;
            }

            .section-title {
                margin: 24px 0 16px 0;
            }

            .evaluation-item {
                padding: 14px;
                margin-bottom: 14px;
            }

            .rating-options {
                gap: 6px;
            }

            .button-group {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .btn-submit {
                grid-column: 1;
            }

            .btn-reset {
                grid-column: 1;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 12px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 20px;
            }

            .header p {
                font-size: 12px;
            }

            .section-title {
                font-size: 16px;
            }

            .rating-option {
                padding: 10px 6px;
                font-size: 11px;
            }

            label {
                font-size: 13px;
            }

            button {
                font-size: 13px;
                padding: 12px 14px;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-top: max(12px, env(safe-area-inset-top));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 ประเมิน KPI บริษัทคู่สัญญา</h1>
            <p>ประเมินคุณภาพการให้บริการของบริษัทคู่สัญญา</p>
        </div>

        <div id="alert" class="alert"></div>

        <div id="successOverlay" class="success-overlay"></div>
        <div id="successModal" class="success-modal">
            <span class="success-icon">✓</span>
            <h2>ส่งสำเร็จ!</h2>
            <p>ขอบคุณที่ประเมินผลการทำงาน<br>ข้อมูลของท่านได้ถูกบันทึกเรียบร้อยแล้ว</p>
            <button type="button" class="btn-ok" onclick="closeSuccessModal()">ตกลง</button>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span id="progressText">0%</span>
            </div>
        </div>

        <form id="kpiForm">
            <div class="form-group">
                <label for="evaluatorName">บ้านเลขที่ *</label>
                <input type="text" id="evaluatorName" list="buildingList" placeholder="-- พิมพ์ค้นหาบ้านเลขที่ เช่น 300/001 --" autocomplete="off" required>
                <datalist id="buildingList">
                    </datalist>
            </div>

            <div class="form-group">
                <label for="evaluationDate">วันที่ประเมิน *</label>
                <input type="date" id="evaluationDate" required>
            </div>

            <div class="section-title">📋 งานบริหารจัดการ</div>

            <div class="evaluation-item">
                <label class="evaluation-label">การเก็บค่าส่วนกลางและจัดการงบประมาณ</label>
                <div class="rating-options" data-kpi="admin_fee_collection">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">ความพึงพอใจของลูกบ้านต่อการบริหารจัดการ</label>
                <div class="rating-options" data-kpi="admin_satisfaction">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">การควบคุมมาตรฐานการทำงานของบริษัทคู่สัญญา</label>
                <div class="rating-options" data-kpi="admin_outsource_control">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">การปฏิบัติตามกฎหมายและข้อบังคับ</label>
                <div class="rating-options" data-kpi="admin_compliance">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">ความคุ้มค่าเมื่อเทียบกับราคาที่จ่าย</label>
                <div class="rating-options" data-kpi="admin_value">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="section-title">🔒 งานรักษาความปลอดภัย</div>

            <div class="evaluation-item">
                <label class="evaluation-label">การป้องกันและการจัดการเหตุฉุกเฉิน</label>
                <div class="rating-options" data-kpi="security_incident">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">การปฏิบัติหน้าที่ตรวจตรา และการบันทึกข้อมูลเข้า-ออก</label>
                <div class="rating-options" data-kpi="security_patrol">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">การจัดการปัญหาจราจรและการจอดรถ</label>
                <div class="rating-options" data-kpi="security_traffic">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">ความสุภาพและการให้บริการของพนักงาน รปภ.</label>
                <div class="rating-options" data-kpi="security_service">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">ความคุ้มค่าเมื่อเทียบกับราคาที่จ่าย</label>
                <div class="rating-options" data-kpi="security_value">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="section-title">🧹 งานทำความสะอาด</div>

            <div class="evaluation-item">
                <label class="evaluation-label">ความสะอาดและทัศนียภาพของพื้นที่ส่วนกลาง</label>
                <div class="rating-options" data-kpi="cleaning_cleanliness">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">การจัดการและการใช้วัสดุทำความสะอาดอย่างเหมาะสม</label>
                <div class="rating-options" data-kpi="cleaning_chemical">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">การดูแลรักษาพื้นที่สีเขียวและสิ่งอำนวยความสะดวก</label>
                <div class="rating-options" data-kpi="cleaning_landscape">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">ความสุภาพและการให้บริการของพนักงานแม่บ้าน</label>
                <div class="rating-options" data-kpi="cleaning_service">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="evaluation-item">
                <label class="evaluation-label">ความคุ้มค่าเมื่อเทียบกับราคาที่จ่าย</label>
                <div class="rating-options" data-kpi="cleaning_value">
                    <button type="button" class="rating-option" data-value="1">ปรับปรุง</button>
                    <button type="button" class="rating-option" data-value="2">พอใช้</button>
                    <button type="button" class="rating-option" data-value="3">ดี</button>
                </div>
            </div>

            <div class="form-group">
                <label for="comments">ข้อเสนอแนะเพิ่มเติม (ไม่บังคับ)</label>
                <textarea id="comments" placeholder="ระบุข้อเสนอแนะ..."></textarea>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>💾 กำลังบันทึก...</p>
            </div>
            <div class="button-group">
                <button type="submit" class="btn-submit" id="submitBtn">ส่งแบบฟอร์ม</button>
                <button type="reset" class="btn-reset">ล้างข้อมูล</button>
            </div>

        </form>
    </div>

    <script>
        // Building numbers from Excel file
        const buildingNumbers = ["300/001", "300/002", "300/003", "300/004", "300/005", "300/006", "300/007", "300/008", "300/009", "300/010", "300/011", "300/012", "300/013", "300/014", "300/015", "300/016", "300/017", "300/018", "300/019", "300/020", "300/021", "300/022", "300/023", "300/024", "300/025", "300/026", "300/027", "300/028", "300/029", "300/030", "300/031", "300/032", "300/033", "300/034", "300/035", "300/036", "300/037", "300/038", "300/039", "300/040", "300/041", "300/042", "300/043", "300/044", "300/045", "300/046", "300/047", "300/048", "300/049", "300/050", "300/051", "300/052", "300/053", "300/054", "300/055", "300/056", "300/057", "300/058", "300/059", "300/060", "300/061", "300/062", "300/063", "300/064", "300/065", "300/066", "300/067", "300/068", "300/069", "300/070", "300/071", "300/072", "300/073", "300/074", "300/075", "300/076", "300/077", "300/078", "300/079", "300/080", "300/081", "300/082", "300/083", "300/084", "300/085", "300/086", "300/087", "300/088", "300/089", "300/090", "300/091", "300/092", "300/093", "300/094", "300/095", "300/096", "300/097", "300/098", "300/099", "300/100"];

        const form = document.getElementById('kpiForm');
        const alertDiv = document.getElementById('alert');
        const loadingDiv = document.getElementById('loading');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const submitBtn = document.getElementById('submitBtn');
        const buildingList = document.getElementById('buildingList');
        const evaluatorInput = document.getElementById('evaluatorName');

        // Populate building numbers inside datalist
        buildingNumbers.forEach(num => {
            const option = document.createElement('option');
            option.value = num;
            buildingList.appendChild(option);
        });

        // Set today's date
        document.getElementById('evaluationDate').valueAsDate = new Date();

        // Add event listeners to rating options
        document.querySelectorAll('.rating-option').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const container = this.closest('.rating-options');
                container.querySelectorAll('.rating-option').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                updateProgress();
            });
        });

        // Update progress
        function updateProgress() {
            const totalItems = document.querySelectorAll('.rating-options').length;
            const selectedItems = document.querySelectorAll('.rating-option.selected').length;
            const progress = totalItems > 0 ? (selectedItems / totalItems) * 100 : 0;
            
            progressFill.style.width = progress + '%';
            progressText.textContent = Math.round(progress) + '%';
        }

        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate required inputs (including text input)
            const inputVal = evaluatorInput.value.trim();
            if (!inputVal) {
                showAlert('❌ กรุณากรอกข้อมูลบ้านเลขที่ให้ครบถ้วน', 'error');
                return;
            }

            // Optional: ตรวจสอบเพิ่มเติมว่าบ้านเลขที่ที่กรอก มีอยู่ในระบบจริงหรือไม่
            if (!buildingNumbers.includes(inputVal)) {
                showAlert('❌ ไม่พบข้อมูลบ้านเลขที่นี้ในระบบ กรุณาเลือกจากรายการค้นหา', 'error');
                return;
            }

            // Validate all items are scored
            const allScored = document.querySelectorAll('.rating-options').length === document.querySelectorAll('.rating-option.selected').length;
            if (!allScored) {
                showAlert('❌ กรุณาให้คะแนนทั้งหมด', 'error');
                return;
            }

            // Collect form data
            const formData = {
                evaluatorName: inputVal,
                evaluationDate: document.getElementById('evaluationDate').value,
                timestamp: new Date().toISOString(),
                
                // งานบริหารจัดการ
                admin: {
                    scores: {
                        feeCollection: document.querySelector('[data-kpi="admin_fee_collection"] .rating-option.selected')?.dataset.value || '',
                        satisfaction: document.querySelector('[data-kpi="admin_satisfaction"] .rating-option.selected')?.dataset.value || '',
                        outsourceControl: document.querySelector('[data-kpi="admin_outsource_control"] .rating-option.selected')?.dataset.value || '',
                        compliance: document.querySelector('[data-kpi="admin_compliance"] .rating-option.selected')?.dataset.value || '',
                        value: document.querySelector('[data-kpi="admin_value"] .rating-option.selected')?.dataset.value || ''
                    }
                },
                
                // งานรักษาความปลอดภัย
                security: {
                    scores: {
                        incident: document.querySelector('[data-kpi="security_incident"] .rating-option.selected')?.dataset.value || '',
                        patrol: document.querySelector('[data-kpi="security_patrol"] .rating-option.selected')?.dataset.value || '',
                        traffic: document.querySelector('[data-kpi="security_traffic"] .rating-option.selected')?.dataset.value || '',
                        service: document.querySelector('[data-kpi="security_service"] .rating-option.selected')?.dataset.value || '',
                        value: document.querySelector('[data-kpi="security_value"] .rating-option.selected')?.dataset.value || ''
                    }
                },
                
                // งานทำความสะอาด
                cleaning: {
                    scores: {
                        cleanliness: document.querySelector('[data-kpi="cleaning_cleanliness"] .rating-option.selected')?.dataset.value || '',
                        chemical: document.querySelector('[data-kpi="cleaning_chemical"] .rating-option.selected')?.dataset.value || '',
                        landscape: document.querySelector('[data-kpi="cleaning_landscape"] .rating-option.selected')?.dataset.value || '',
                        service: document.querySelector('[data-kpi="cleaning_service"] .rating-option.selected')?.dataset.value || '',
                        value: document.querySelector('[data-kpi="cleaning_value"] .rating-option.selected')?.dataset.value || ''
                    }
                },
                
                comments: document.getElementById('comments').value
            };

            loadingDiv.classList.add('show');
            submitBtn.disabled = true;

            try {
                // Send to backend (GAS)
                const gasUrl = 'https://script.google.com/macros/s/AKfycbzCA6H4uWEkrL08FRSAVFpHPI7Vo2W3RBkUn7oGGlCthu8SyKhUFrTDXYzTwVg_KBTY/exec';
                const response = await fetch(gasUrl, {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    showSuccessModal();
                    setTimeout(() => {
                        form.reset();
                        document.querySelectorAll('.rating-option').forEach(btn => btn.classList.remove('selected'));
                        progressFill.style.width = '0%';
                        progressText.textContent = '0%';
                        document.getElementById('evaluationDate').valueAsDate = new Date();
                        closeSuccessModal();
                    }, 3000);
                } else {
                    showAlert('❌ เกิดข้อผิดพลาด', 'error');
                }
            } catch (error) {
                showAlert('❌ ' + error.message, 'error');
            } finally {
                loadingDiv.classList.remove('show');
                submitBtn.disabled = false;
            }
        });

        // เพิ่มฟังก์ชันดักจับปุ่ม Reset ให้เคลียร์คลาส selected และ progress bar ด้วย
        form.addEventListener('reset', function() {
            setTimeout(() => {
                document.querySelectorAll('.rating-option').forEach(btn => btn.classList.remove('selected'));
                progressFill.style.width = '0%';
                progressText.textContent = '0%';
                document.getElementById('evaluationDate').valueAsDate = new Date();
            }, 10);
        });

        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = 'alert show alert-' + type;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 4000);
        }

        function showSuccessModal() {
            document.getElementById('successOverlay').classList.add('show');
            document.getElementById('successModal').classList.add('show');
        }

        function closeSuccessModal() {
            document.getElementById('successOverlay').classList.remove('show');
            document.getElementById('successModal').classList.remove('show');
        }

        // Initialize
        updateProgress();
    </script>
</body>
</html>
